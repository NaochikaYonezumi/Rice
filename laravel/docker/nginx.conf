user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    client_max_body_size 25M;
    client_body_temp_path /tmp/nginx_client_body;

    # 共通の Laravel ルーティング設定 (HTTP/HTTPS どちらでも使い回す)
    map $http_x_forwarded_proto $fastcgi_https {
        default "";
        https on;
    }

    # ------------------------------------------------------------------
    # HTTP (port 80)
    #   - cert が存在する場合は HTTPS に強制リダイレクト
    #   - cert がまだ無い (初回 acme.sh 実行前) 場合はそのまま Laravel を返す
    # ------------------------------------------------------------------
    server {
        listen 80 default_server;
        server_name _;
        root /var/www/html/public;
        index index.php index.html;

        # acme.sh の DNS-01 では http-01 不要だが、将来 http-01 切替時用に残す
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/html/public;
            default_type "text/plain";
            try_files $uri =404;
        }

        # 証明書が配置されていれば 301 で HTTPS へ
        # /etc/nginx/certs/fullchain.pem の有無を判定 (起動時 entrypoint で生成)
        if (-f /etc/nginx/certs/.enabled) {
            return 301 https://$host$request_uri;
        }

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param HTTPS $fastcgi_https if_not_empty;
            fastcgi_read_timeout 120;
        }

        location ~ /\.ht {
            deny all;
        }
    }

    # ------------------------------------------------------------------
    # HTTPS (port 443)
    #   - cert ファイルが無い場合 nginx は起動できないため、
    #     entrypoint.sh で fallback の self-signed を生成して必ず存在させる
    # ------------------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name _;
        root /var/www/html/public;
        index index.php index.html;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # 社内限定なので HSTS は控えめ (preload はつけない)
        add_header Strict-Transport-Security "max-age=31536000" always;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param HTTPS on;
            fastcgi_read_timeout 120;
        }

        location ~ /\.ht {
            deny all;
        }
    }
}
